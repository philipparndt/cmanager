version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

release:
  github:
    owner: philipparndt
    name: cmanager

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
    - goos: windows
      formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: cmanager

    goarm: 6
    goamd64: v1

    url_template: "https://github.com/philipparndt/cmanager/releases/download/{{ .Tag }}/{{ .ArtifactName }}"

    commit_author:
      name: Philipp Arndt
      email: opensource@rnd7.de

    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

    directory: Formula

    caveats: "Run `cmanager setup` to wire the Claude Code hooks + tmux keybinding."

    homepage: "https://github.com/philipparndt/cmanager"

    description: "Find, jump to, and get notified about Claude Code sessions in tmux"

    install: |
      bin.install "cmanager"

    repository:
      owner: philipparndt
      name: homebrew-cmanager
      branch: main

      pull_request:
        enabled: false
        draft: false
